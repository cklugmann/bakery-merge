<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🥐 Bakery Merge</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;touch-action:none}
body{background:radial-gradient(ellipse at 30% 20%,#fff3d6,#fde8c2 50%,#f0c878);font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;}
#settings-screen{background:#fff8ee;border-radius:28px;padding:38px 32px;box-shadow:0 20px 60px rgba(160,90,20,.2),inset 0 2px 0 #e8c87a;border:3px solid #e8c87a;text-align:center;max-width:400px;width:92vw;max-height:92vh;overflow-y:auto;}
#settings-screen h1{font-family:'Pacifico',cursive;font-size:2rem;color:#7a3e0a;margin-bottom:4px}
.subtitle{color:#b06020;font-size:.88rem;font-weight:700;margin-bottom:22px}
.setting-group{margin-bottom:16px;text-align:left}
.setting-group label{display:flex;justify-content:space-between;align-items:center;font-weight:700;color:#5c3010;font-size:.85rem;margin-bottom:6px}
.setting-group label span{background:#f5d88a;color:#7a4000;border-radius:8px;padding:2px 9px;font-size:.82rem;font-weight:800}
input[type=range]{-webkit-appearance:none;width:100%;height:8px;border-radius:8px;background:linear-gradient(to right,#e8a840,#f5d88a);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#e07820;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer}
@media(max-width:599px){.desktop-only{display:none!important}}
#start-btn{font-family:'Pacifico',cursive;font-size:1.15rem;background:linear-gradient(135deg,#f08020,#e05010);color:#fff;border:none;border-radius:50px;padding:13px 46px;cursor:pointer;margin-top:10px;box-shadow:0 5px 0 #a03000;transition:transform .1s,box-shadow .1s}
#start-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #a03000}
#game-screen{display:none}
@media(min-width:600px){#game-screen{flex-direction:row;align-items:flex-start}#sidebar{display:flex}#mobile-hud{display:none!important}#game-col{flex-direction:column}}
@media(max-width:599px){#game-screen{flex-direction:column;align-items:center}#sidebar{display:none!important}#mobile-hud{display:flex!important}#game-col{flex-direction:column;width:100%}#unit-bar-canvas{border-radius:0!important}canvas#gameCanvas{border-radius:0 0 16px 16px!important}}
#sidebar{width:172px;background:#fff8ee;border-radius:20px 0 0 20px;padding:18px 12px;flex-direction:column;gap:12px;border:3px solid #e8c87a;border-right:none;align-self:stretch;}
#sidebar h2{font-family:'Pacifico',cursive;font-size:1.1rem;color:#7a3e0a;text-align:center;line-height:1.2}
.info-card{background:linear-gradient(135deg,#fff3d0,#ffe9b0);border:2px solid #e8c060;border-radius:12px;padding:9px 11px}
.card-label{font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#a06020;margin-bottom:2px}
.card-value{font-size:1.32rem;font-weight:800;color:#5c2800}
.prog-wrap{background:#e8d090;border-radius:8px;height:7px;margin-top:6px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#e07020,#f0a020);border-radius:8px;transition:width .3s ease;width:0%}
#next-preview{text-align:center}
.preview-label{font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#a06020;margin-bottom:4px}
#next-canvas{border-radius:10px;background:linear-gradient(135deg,#fff3d0,#ffe9b0);border:2px solid #e8c060;display:block;margin:0 auto}
#next-name{font-size:.78rem;font-weight:700;color:#5c2800;margin-top:3px}
.chain-label{font-size:.68rem;font-weight:800;color:#e07020;min-height:13px}
#restart-btn{font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:800;background:#e07020;color:#fff;border:none;border-radius:50px;padding:8px 0;width:100%;cursor:pointer;box-shadow:0 4px 0 #a04000;margin-top:auto}
#restart-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #a04000}
#mobile-hud{display:none;width:100%;background:#fff8ee;border-top:3px solid #e8c87a;border-radius:0 0 16px 16px;padding:8px 10px;gap:6px;align-items:center;flex-wrap:wrap;}
.mhud-block{display:flex;flex-direction:column;align-items:center;background:linear-gradient(135deg,#fff3d0,#ffe9b0);border:1.5px solid #e8c060;border-radius:10px;padding:5px 10px;flex:1;min-width:60px}
.mhud-label{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#a06020}
.mhud-val{font-size:1.05rem;font-weight:800;color:#5c2800;line-height:1}
#m-next-wrap{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#fff3d0,#ffe9b0);border:1.5px solid #e8c060;border-radius:10px;padding:5px 8px}
#m-next-canvas{border-radius:6px;background:transparent;display:block}
#m-chain{font-size:.65rem;font-weight:800;color:#e07020;min-height:12px;text-align:center;width:100%}
#m-restart{font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:800;background:#e07020;color:#fff;border:none;border-radius:50px;padding:7px 12px;cursor:pointer;box-shadow:0 3px 0 #a04000}
#game-col{display:flex;align-items:stretch}
#unit-bar-canvas{display:block;border:3px solid #e8c87a;border-bottom:2px dashed #d4a855;background:#fff8e6;border-radius:0 14px 0 0;cursor:default;flex-shrink:0}
canvas#gameCanvas{display:block;border:3px solid #e8c87a;border-top:none;border-radius:0 0 20px 0;cursor:crosshair}
.overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;pointer-events:none;opacity:0;transition:opacity .3s}
.overlay.show{opacity:1;pointer-events:all}
#go-overlay{background:rgba(80,30,0,.8)}
#go-overlay h2{font-family:'Pacifico',cursive;font-size:2.2rem;color:#fff;text-shadow:0 4px 20px rgba(0,0,0,.5);text-align:center}
#go-overlay p{color:#ffd090;font-size:.95rem;font-weight:700;text-align:center}
.obtn{font-family:'Pacifico',cursive;font-size:1rem;background:linear-gradient(135deg,#f08020,#e05010);color:#fff;border:none;border-radius:50px;padding:12px 36px;cursor:pointer;box-shadow:0 5px 0 #a03000}
#lvl-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:300;background:rgba(200,140,0,.93);border-radius:18px;padding:18px 36px;text-align:center;pointer-events:none;opacity:0;transition:opacity .25s;}
#lvl-banner h2{font-family:'Pacifico',cursive;font-size:1.8rem;color:#fff}
#lvl-banner.show{opacity:1}
</style>
</head>
<body>

<div id="settings-screen">
  <h1>🥐 Bakery<br>Merge</h1>
  <p class="subtitle">Drop, stack &amp; merge your baked goods!</p>
  <div class="setting-group desktop-only">
    <label>Field width <span id="wVal">380 px</span></label>
    <input type="range" id="wRange" min="300" max="520" value="380" step="10">
  </div>
  <div class="setting-group desktop-only">
    <label>Field height <span id="hVal">560 px</span></label>
    <input type="range" id="hRange" min="440" max="800" value="560" step="10">
  </div>
  <button id="start-btn">🎮 Play!</button>
</div>

<div id="game-screen">
  <div id="sidebar">
    <h2>🥐 Bakery<br>Merge</h2>
    <div class="info-card"><div class="card-label">Score</div><div class="card-value" id="ui-score">0</div><div class="chain-label" id="ui-chain"></div></div>
    <div class="info-card"><div class="card-label">Level</div><div class="card-value" id="ui-level">1</div></div>
    <div class="info-card"><div class="card-label">Merges</div><div class="card-value" id="ui-merges">0/6</div><div class="prog-wrap"><div class="prog-fill" id="ui-prog"></div></div></div>
    <div id="next-preview"><div class="preview-label">Next</div><canvas id="next-canvas" width="100" height="100"></canvas><div id="next-name">–</div></div>
    <button id="restart-btn">↺ Restart</button>
  </div>
  <div id="game-col"><canvas id="unit-bar-canvas"></canvas><canvas id="gameCanvas"></canvas></div>
  <div id="mobile-hud">
    <div class="mhud-block"><div class="mhud-label">Score</div><div class="mhud-val" id="m-score">0</div></div>
    <div class="mhud-block"><div class="mhud-label">Level</div><div class="mhud-val" id="m-level">1</div></div>
    <div class="mhud-block" style="flex:2"><div class="mhud-label">Merges</div><div class="mhud-val" id="m-merges">0/6</div><div class="prog-wrap" style="width:100%;margin-top:4px"><div class="prog-fill" id="m-prog"></div></div></div>
    <div id="m-next-wrap"><canvas id="m-next-canvas" width="44" height="44"></canvas><div style="display:flex;flex-direction:column;gap:1px"><div class="mhud-label">Next</div><div class="mhud-val" id="m-next-name" style="font-size:.72rem">–</div></div></div>
    <div id="m-chain"></div><button id="m-restart" class="m-restart">↺</button>
  </div>
</div>

<div id="go-overlay" class="overlay">
  <h2>🍰 Game Over!</h2>
  <p>Level <strong><span id="go-level">1</span></strong><br>Score: <strong><span id="go-score-val">0</span></strong></p>
  <button class="obtn" id="go-btn">↺ Play Again</button>
</div>
<div id="lvl-banner"><h2 id="lvl-banner-title">Level 1 Complete! 🎉</h2></div>

<script>
'use strict';
// Das Sleeping Modul wird nicht mehr benötigt
const { Engine, Runner, Bodies, Body, Composite, Events } = Matter;
const TAU = Math.PI * 2;
const BG = '#fff8e6';
const isMobile = () => window.innerWidth < 600;

// ═══════════════════════════════════════════════════════════
//  SMOOTH VERTEX GENERATORS (Glatte Polygon-Approximationen)
// ═══════════════════════════════════════════════════════════
function getMuffinVerts(r) {
  let p =[];
  p.push({x: -0.5*r, y: 0.8*r}); p.push({x: 0.5*r, y: 0.8*r}); p.push({x: 0.7*r, y: 0.1*r});
  for(let i=1; i<20; i++) { let a = (i/20)*Math.PI; p.push({x: 0.8*r*Math.cos(a), y: 0.1*r - 0.8*r*Math.sin(a)}); }
  p.push({x: -0.7*r, y: 0.1*r});
  return p;
}
function getCupcakeVerts(r) {
  let p =[];
  p.push({x: -0.4*r, y: 0.9*r}); p.push({x: 0.4*r, y: 0.9*r}); p.push({x: 0.6*r, y: 0.2*r});
  for(let i=1; i<20; i++) { let a = (i/20)*Math.PI; p.push({x: 0.7*r*Math.cos(a), y: 0.2*r - 1.1*r*Math.sin(a)}); }
  p.push({x: -0.6*r, y: 0.2*r});
  return p;
}
function getCreamPuffVerts(r) {
  let p =[];
  for(let i=0; i<40; i++) {
    let a = (i/40)*TAU;
    let rad = r * (0.88 + 0.12 * Math.cos(a * 6));
    p.push({x: rad*Math.cos(a), y: rad*Math.sin(a)});
  }
  return p;
}
function getCroissantVerts(r) {
  let p =[];
  for(let i=0; i<=20; i++) {
     let a = Math.PI + (i/20)*Math.PI; 
     p.push({x: Math.cos(a)*r, y: Math.sin(a)*r*0.7 + r*0.1});
  }
  for(let i=19; i>=1; i--) {
     let a = Math.PI + (i/20)*Math.PI;
     p.push({x: Math.cos(a)*r, y: -Math.sin(a)*r*0.2 + r*0.1});
  }
  return p;
}
function getBreadVerts(r) {
  let p =[];
  for(let i=0; i<30; i++) {
    let a = (i/30)*TAU; let rx = 1.0 * r, ry = 0.65 * r;
    let y = ry * Math.sin(a); if(y > ry * 0.6) y = ry * 0.6;
    p.push({x: rx*Math.cos(a), y: y});
  }
  return p;
}

// ═══════════════════════════════════════════════════════════
//  TEXTURE & RENDERING FUNCTIONS
// ═══════════════════════════════════════════════════════════
function drawGloss(ctx, r) {
  ctx.beginPath(); ctx.arc(-r*0.25, -r*0.25, r*0.4, 0, TAU);
  const grad = ctx.createRadialGradient(-r*0.25, -r*0.25, 0, -r*0.25, -r*0.25, r*0.4);
  grad.addColorStop(0, 'rgba(255,255,255,0.45)'); grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad; ctx.fill();
  ctx.beginPath(); ctx.arc(0, 0, r, 0, TAU);
  const shad = ctx.createRadialGradient(0, 0, r*0.65, 0, 0, r*1.05);
  shad.addColorStop(0, 'rgba(0,0,0,0)'); shad.addColorStop(1, 'rgba(0,0,0,0.3)');
  ctx.fillStyle = shad; ctx.fill();
}

function drawCookie(ctx, r, g) {
  ctx.fillStyle = g ? '#d4af37' : '#dcb07a'; ctx.fillRect(-r*1.2, -r*1.2, r*2.4, r*2.4);
  ctx.fillStyle = g ? '#8B6914' : '#593b1d';
  for(const [cx, cy, cw] of [[-r*0.3, -r*0.4, r*0.18],[r*0.2, -r*0.5, r*0.14],[r*0.4, r*0.3, r*0.2],[-r*0.5, r*0.2, r*0.16], [0, r*0.6, r*0.14]]) {
    ctx.beginPath(); ctx.arc(cx, cy, cw, 0, TAU); ctx.fill();
  }
}

function drawMuffin(ctx, r, g) {
  ctx.fillStyle = g ? '#f0dea0' : '#8fa8c8'; ctx.fillRect(-r*1.2, 0, r*2.4, r*1.2); 
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 2;
  for(let x=-r; x<=r; x+=r*0.25) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, r*1.2); ctx.stroke(); }
  ctx.fillStyle = g ? '#d4af37' : '#d28c40'; ctx.fillRect(-r*1.2, -r*1.2, r*2.4, r*1.2); 
  ctx.fillStyle = '#3a445e';
  for (const[bx, by] of [[-r*0.4, -r*0.5],[r*0.3, -r*0.7],[0, -r*0.3],[r*0.6, -r*0.4]]) { ctx.beginPath(); ctx.arc(bx, by, r*0.14, 0, TAU); ctx.fill(); }
}

function drawDonut(ctx, r, g) {
  ctx.fillStyle = g ? '#e8c87a' : '#e6ba81'; ctx.fillRect(-r*1.2,-r*1.2,r*2.4,r*2.4);
  ctx.beginPath(); ctx.arc(0, -r*0.1, r*0.9, 0, Math.PI, true); ctx.arc(0, 0, r*0.9, Math.PI, TAU, true);
  ctx.fillStyle = g ? '#ffd700' : '#ff7eb6'; ctx.fill();
  ctx.lineWidth = 3; const spC =['#fff', '#237bd1', '#ffed4a', '#44d62c']; let i=0;
  for(const[sx, sy, sa] of [[-r*0.5, -r*0.4, 0.5],[r*0.4, -r*0.5, -0.3],[0, -r*0.7, 1.2],[-r*0.6, 0, 0.1],[r*0.6, r*0.1, -0.8]]) {
    ctx.strokeStyle = spC[i++ % spC.length];
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx + Math.cos(sa)*r*0.25, sy + Math.sin(sa)*r*0.25); ctx.stroke();
  }
}

function drawCupcake(ctx, r, g) {
  ctx.fillStyle = g ? '#f5e080' : '#eb5e7a'; ctx.fillRect(-r*1.2, 0.2*r, r*2.4, r*1.2);
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 2;
  for(let x=-r; x<=r; x+=r*0.2) { ctx.beginPath(); ctx.moveTo(x, 0.2*r); ctx.lineTo(x, r*1.2); ctx.stroke(); }
  ctx.fillStyle = g ? '#ffd700' : '#fffae6'; ctx.fillRect(-r*1.2, -r*1.2, r*2.4, r*1.4);
  ctx.strokeStyle = g ? '#e8c060' : '#ffd1dc'; ctx.lineWidth = r*0.15;
  ctx.beginPath(); ctx.moveTo(-r, -r*0.2); ctx.quadraticCurveTo(0, r*0.2, r, -r*0.2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-r*0.6, -r*0.6); ctx.quadraticCurveTo(0, -r*0.2, r*0.6, -r*0.6); ctx.stroke();
  ctx.fillStyle = g ? '#c8a000' : '#d9183b'; ctx.beginPath(); ctx.arc(0, -r*0.8, r*0.18, 0, TAU); ctx.fill();
}

function drawCreamPuff(ctx, r, g) {
  ctx.fillStyle = g ? '#ffd700' : '#eabf7b'; ctx.fillRect(-r*1.2, -r*1.2, r*2.4, r*2.4); 
  ctx.fillStyle = g ? '#fff0b3' : '#ffffff';
  ctx.beginPath(); ctx.moveTo(-r*1.2, 0);
  for(let x=-r*1.2; x<=r*1.2; x+=r*0.2) { ctx.lineTo(x, Math.sin(x/r * 15) * r*0.1); }
  ctx.lineTo(r*1.2, r*0.3); ctx.lineTo(-r*1.2, r*0.3); ctx.fill();
  
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.moveTo(-r*0.7, -r*0.3);
  ctx.quadraticCurveTo(-r*0.3, -r*0.6, 0, -r*0.5);
  ctx.quadraticCurveTo(r*0.4, -r*0.7, r*0.6, -r*0.4);
  ctx.quadraticCurveTo(r*0.8, -r*0.1, r*0.5, -r*0.2);
  ctx.quadraticCurveTo(0, -r*0.1, -r*0.5, -r*0.2);
  ctx.fill();
}

function drawCroissant(ctx, r, g) {
  ctx.fillStyle = g ? '#ffd700' : '#e6ab4c'; ctx.fillRect(-r*1.2, -r*1.2, r*2.4, r*2.4);
  ctx.strokeStyle = g ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.15)'; 
  ctx.lineWidth = r*0.08; ctx.lineCap = 'round';
  for(let x=-r*0.6; x<=r*0.6; x+=r*0.35) {
    ctx.beginPath();
    ctx.moveTo(x - r*0.1, -r*0.6);
    ctx.quadraticCurveTo(x + r*0.2, 0, x - r*0.1, r*0.4);
    ctx.stroke();
  }
}

function drawCinnamonRoll(ctx, r, g) {
  ctx.fillStyle = g ? '#e8c87a' : '#d29656'; ctx.fillRect(-r*1.2, -r*1.2, r*2.4, r*2.4);
  ctx.strokeStyle = g ? '#c8a000' : '#73441a'; ctx.lineWidth = r*0.12; ctx.lineCap = 'round';
  ctx.beginPath();
  for(let a=0; a<Math.PI*5; a+=0.2) { let rad = (a / (Math.PI*5)) * r * 0.85; ctx.lineTo(Math.cos(a)*rad, Math.sin(a)*rad); }
  ctx.stroke();
  
  ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = r*0.06; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(-r*0.7, -r*0.3); ctx.quadraticCurveTo(-r*0.2, -r*0.5, 0, -r*0.1); ctx.quadraticCurveTo(r*0.3, r*0.3, r*0.6, -r*0.2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-r*0.5, r*0.4); ctx.quadraticCurveTo(0, r*0.1, r*0.2, r*0.6); ctx.quadraticCurveTo(r*0.5, r*0.5, r*0.7, r*0.2); ctx.stroke();
}

function drawBread(ctx, r, g) {
  ctx.fillStyle = g ? '#ffd700' : '#d49648'; ctx.fillRect(-r*1.2, -r*1.2, r*2.4, r*2.4);
  ctx.strokeStyle = g ? '#ffeaa8' : '#e6d1ad'; ctx.lineWidth = r*0.12; ctx.lineCap = 'round';
  for(let x=-r*0.4; x<=r*0.4; x+=r*0.35) {
    ctx.beginPath(); ctx.moveTo(x - r*0.15, -r*0.3); ctx.lineTo(x + r*0.15, r*0.3); ctx.stroke();
  }
}

function drawPizza(ctx, r, g) {
  ctx.fillStyle = g ? '#b8860b' : '#de9c3c'; ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.fill();
  ctx.fillStyle = g ? '#ffd700' : '#f5c938'; ctx.beginPath(); ctx.arc(0,0,r*0.88,0,TAU); ctx.fill();
  ctx.fillStyle = g ? '#e6b800' : '#cc2a18';
  for(const [px, py] of [[0,0],[-r*0.4, -r*0.3],[r*0.4, -r*0.2],[r*0.2, r*0.4],[-r*0.3, r*0.5],[-r*0.1, -r*0.6],[r*0.5, 0.3*r]]) {
    ctx.beginPath(); ctx.arc(px, py, r*0.16, 0, TAU); ctx.fill();
  }
  ctx.fillStyle = g ? '#a48400' : '#4d8a2a'; 
  for(const [bx, by] of [[-r*0.2, -r*0.1],[r*0.3, 0],[0, r*0.3], [r*0.1, -r*0.4],[-r*0.5, 0.2*r]]) {
    ctx.beginPath(); ctx.arc(bx, by, r*0.04, 0, TAU); ctx.fill();
  }
}

function drawWeddingCake(ctx, r, g) {
  ctx.fillStyle = g ? '#ffecb3' : '#ffffff'; ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.fill();
  ctx.strokeStyle = g ? '#d4af37' : '#ffb3c6'; ctx.lineWidth = r*0.04; ctx.stroke();
  ctx.fillStyle = g ? '#ffe082' : '#fff0f5'; ctx.beginPath(); ctx.arc(0,0,r*0.7,0,TAU); ctx.fill(); ctx.stroke();
  ctx.fillStyle = g ? '#ffd54f' : '#ffffff'; ctx.beginPath(); ctx.arc(0,0,r*0.4,0,TAU); ctx.fill(); ctx.stroke();
  ctx.fillStyle = g ? '#ffffff' : '#ff85a2';
  for(let tr of[r*0.9, r*0.6, r*0.3]) {
    let count = tr === r*0.9 ? 16 : tr === r*0.6 ? 12 : 8;
    for(let i=0; i<count; i++) {
      let a = (i/count)*TAU;
      ctx.beginPath(); ctx.arc(tr*Math.cos(a), tr*Math.sin(a), r*0.06, 0, TAU); ctx.fill();
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  UNIT REGISTRY & PHYSICS
// ═══════════════════════════════════════════════════════════
const WALL_O = { isStatic: true, friction: 0.5, restitution: 0.2, label: 'wall', slop: 0.01 };
// sleepThreshold wurde entfernt, da Schlaf-Modus deaktiviert wird
const BASE_O = { friction: 0.4, frictionStatic: 0.5, restitution: 0.15, frictionAir: 0.01, slop: 0.01, label: 'unit', collisionFilter: { category: 0x0001, mask: 0x0003 } };

const getOpts = (r) => ({ ...BASE_O, density: 0.003 * (20 / r) });

const UNITS =[
  { name: 'Cookie',        r: 16,  isCircle: true,  borderCol: '#7a4411', drawFn: drawCookie,
    mkBody: (x,y) => { const b = Bodies.circle(x,y,16,getOpts(16)); b.unitId=0; return b; } },
  { name: 'Muffin',        r: 25,  isCircle: false, borderCol: '#302010', drawFn: drawMuffin,
    mkBody: (x,y) => { const b = Bodies.fromVertices(x,y,getMuffinVerts(25),getOpts(25)); b.unitId=1; return b; } },
  { name: 'Donut',         r: 32,  isCircle: true,  borderCol: '#b26033', drawFn: drawDonut,
    mkBody: (x,y) => { const b = Bodies.circle(x,y,32,getOpts(32)); b.unitId=2; return b; } },
  { name: 'Cupcake',       r: 42,  isCircle: false, borderCol: '#601a2b', drawFn: drawCupcake,
    mkBody: (x,y) => { const b = Bodies.fromVertices(x,y,getCupcakeVerts(42),getOpts(42)); b.unitId=3; return b; } },
  { name: 'Cream Puff',    r: 52,  isCircle: false, borderCol: '#996515', drawFn: drawCreamPuff,
    mkBody: (x,y) => { const b = Bodies.fromVertices(x,y,getCreamPuffVerts(52),getOpts(52)); b.unitId=4; return b; } },
  { name: 'Croissant',     r: 62,  isCircle: false, borderCol: '#9e6012', drawFn: drawCroissant,
    mkBody: (x,y) => { const b = Bodies.fromVertices(x,y,getCroissantVerts(62),getOpts(62)); b.unitId=5; return b; } },
  { name: 'Cinnamon Roll', r: 72,  isCircle: true,  borderCol: '#5c3411', drawFn: drawCinnamonRoll,
    mkBody: (x,y) => { const b = Bodies.circle(x,y,72,getOpts(72)); b.unitId=6; return b; } },
  { name: 'Bread',         r: 85,  isCircle: false, borderCol: '#754817', drawFn: drawBread,
    mkBody: (x,y) => { const b = Bodies.fromVertices(x,y,getBreadVerts(85),getOpts(85)); b.unitId=7; return b; } },
  { name: 'Pizza',         r: 88,  isCircle: true,  borderCol: '#b85514', drawFn: drawPizza,
    mkBody: (x,y) => { const b = Bodies.circle(x,y,88,getOpts(88)); b.unitId=8; return b; } },
  { name: 'Wedding Cake',  r: 101, isCircle: true,  borderCol: '#c49cba', drawFn: drawWeddingCake,
    mkBody: (x,y) => { const b = Bodies.circle(x,y,101,getOpts(101)); b.unitId=9; return b; } }
];

for (const u of UNITS) {
  if (!u.isCircle) {
    const dummy = u.mkBody(0,0);
    u.localVerts = dummy.vertices.map(v => ({x: v.x - dummy.position.x, y: v.y - dummy.position.y}));
  }
}

const SPAWN_WEIGHTS =[15, 25, 25, 25, 10]; 
const SPAWN_MAX = 4; 
const LEVEL_REQS =[6, 12, 20, 30, 44, 62, 84, 112, 148, 192];
const BAR_H = 64;
const SPAWN_H = 86;
const WORLD_MARGIN = 10000;
const MERGE_PTS = UNITS.map((_, i) => 10 * Math.pow(2, i));
const CHAIN_WINDOW_MS = 900;

let engine, runner, canvas, ctx, nCtx, barCtx, mNCtx;
let fieldW = 380, fieldH = 560, spawnX = 190;
let gameRunning = false, gameOver = false, level = 1, mergeCount = 0, score = 0;
let curId = 0, nxtId = 1, canSpawn = true, goTimer = 0;
let chainCount = 0, lastMergeTime = 0;
let cameraY = 0, camAnimating = false, camAnimFrom = 0, camAnimTo = 0, camAnimStart = 0;
let bottomWall = null;
const particles =[], pendingMerges =[], mergingIds = new Set(), floatTexts =[];

const worldDanger = () => cameraY + SPAWN_H;
const worldBottom = () => cameraY + SPAWN_H + fieldH;

document.getElementById('wRange').oninput = e => document.getElementById('wVal').textContent = e.target.value + ' px';
document.getElementById('hRange').oninput = e => document.getElementById('hVal').textContent = e.target.value + ' px';

document.getElementById('start-btn').onclick = () => {
  if(isMobile()){ fieldW = window.innerWidth; fieldH = Math.max(380, window.innerHeight - BAR_H - 72 - SPAWN_H); } 
  else { fieldW = +document.getElementById('wRange').value; fieldH = +document.getElementById('hRange').value; }
  document.getElementById('settings-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  initGame();
};
document.getElementById('restart-btn').onclick = restartGame;
document.getElementById('m-restart').onclick = restartGame;
document.getElementById('go-btn').onclick = () => { hideOvl('go-overlay'); restartGame(); };

function showOvl(id) { document.getElementById(id).classList.add('show'); }
function hideOvl(id) { document.getElementById(id).classList.remove('show'); }

function initGame() {
  canvas = document.getElementById('gameCanvas'); ctx = canvas.getContext('2d');
  nCtx = document.getElementById('next-canvas').getContext('2d');
  mNCtx = document.getElementById('m-next-canvas').getContext('2d');
  const barCv = document.getElementById('unit-bar-canvas'); barCtx = barCv.getContext('2d');
  barCv.width = canvas.width = fieldW; barCv.height = BAR_H; canvas.height = SPAWN_H + fieldH;

  cameraY = 0; camAnimating = false; spawnX = fieldW/2;
  gameRunning = true; gameOver = false; level = 1; mergeCount = 0; score = 0; 
  canSpawn = true; goTimer = 0; chainCount = 0; lastMergeTime = 0;
  floatTexts.length = 0; particles.length = 0; pendingMerges.length = 0; mergingIds.clear();
  curId = randId(); nxtId = randId();

  if(engine){ Runner.stop(runner); Events.off(engine,'collisionStart',onCollision); Events.off(engine,'afterUpdate',processMerges); Engine.clear(engine); }

  // HIER IST DER FIX: enableSleeping wurde auf false gesetzt
  engine = Engine.create({ positionIterations: 10, velocityIterations: 12, constraintIterations: 4, enableSleeping: false });
  engine.gravity.y = 2.1; runner = Runner.create({ delta: 1000/60 });

  const wallH = WORLD_MARGIN * 2;
  Composite.add(engine.world,[
    Bodies.rectangle(-26, WORLD_MARGIN, 52, wallH, WALL_O),
    Bodies.rectangle(fieldW+26, WORLD_MARGIN, 52, wallH, WALL_O),
  ]);
  bottomWall = makeBottomWall(); Composite.add(engine.world, bottomWall);

  Events.on(engine,'collisionStart',onCollision); Events.on(engine,'afterUpdate',processMerges);
  Runner.run(runner, engine);

  updateUI(); drawUnitBar(); requestAnimationFrame(renderLoop);

  const clampX = id => { const u = UNITS[id]; return x => Math.max(u.r+5, Math.min(fieldW-u.r-5, x)); };
  canvas.onmousemove = e => { const r = canvas.getBoundingClientRect(); spawnX = clampX(curId)(e.clientX - r.left); };
  canvas.onclick = dropUnit;

  let touchStartX = 0;
  canvas.ontouchstart = e => { e.preventDefault(); const tx = e.touches[0].clientX - canvas.getBoundingClientRect().left; touchStartX = tx; spawnX = clampX(curId)(tx); };
  canvas.ontouchmove = e => { e.preventDefault(); spawnX = clampX(curId)(e.touches[0].clientX - canvas.getBoundingClientRect().left); };
  canvas.ontouchend = e => {
    e.preventDefault(); if(camAnimating) return;
    const tx = (e.changedTouches[0]?.clientX ?? touchStartX) - canvas.getBoundingClientRect().left;
    spawnX = clampX(curId)(tx); if(Math.abs(tx - touchStartX) <= 18) dropUnit();
  };
}

function makeBottomWall(){ return Bodies.rectangle(fieldW/2, worldBottom()+26, fieldW+120, 52, WALL_O); }

function restartGame(){
  if(engine){ Events.off(engine,'collisionStart',onCollision); Events.off(engine,'afterUpdate',processMerges); Runner.stop(runner); Engine.clear(engine); }
  gameRunning = false; hideOvl('go-overlay'); hideOvl('lvl-banner'); setTimeout(initGame,80);
}

function randId(){
  let rnd = Math.random() * SPAWN_WEIGHTS.reduce((a,b)=>a+b,0);
  for(let i=0; i<=SPAWN_MAX; i++) { rnd -= SPAWN_WEIGHTS[i]; if(rnd <= 0) return i; }
  return 0;
}

function dropUnit(){
  if(!canSpawn || gameOver || camAnimating) return;
  const u = UNITS[curId]; const dropY = worldDanger() - u.r - 8;
  const b = u.mkBody(spawnX, dropY); b.isGolden = false;
  Composite.add(engine.world, b);
  canSpawn = false; curId = nxtId; nxtId = randId(); updateUI();
  setTimeout(() => { canSpawn = true; }, 580);
}

function getRoot(b){ return (b.parent && b.parent !== b) ? b.parent : b; }

function onCollision(event){
  for(const pair of event.pairs){
    const a = getRoot(pair.bodyA), b = getRoot(pair.bodyB);
    if(a === b || a.label !== 'unit' || b.label !== 'unit') continue;
    if(a.unitId === undefined || b.unitId === undefined || a.unitId !== b.unitId) continue;
    if(mergingIds.has(a.id) || mergingIds.has(b.id)) continue;
    mergingIds.add(a.id); mergingIds.add(b.id);
    pendingMerges.push({a,b});
  }
}

function processMerges(){
  if(!pendingMerges.length) return;
  const batch = pendingMerges.splice(0); mergingIds.clear();
  const now = performance.now(); const all = Composite.allBodies(engine.world);
  
  for(const {a, b} of batch){
    if(!all.includes(a) || !all.includes(b)) continue;
    const uid = a.unitId, isGolden = !!(a.isGolden || b.isGolden);
    const newId = (uid === UNITS.length - 1) ? 0 : uid + 1;
    const newGolden = (uid === UNITS.length - 1) ? true : isGolden;

    const mx = (a.position.x + b.position.x) / 2;
    const my = Math.min((a.position.y + b.position.y) / 2, worldBottom() - UNITS[newId].r - 8);

    chainCount = (now - lastMergeTime < CHAIN_WINDOW_MS) ? chainCount + 1 : 1;
    lastMergeTime = now;

    const basePoints = Math.round(MERGE_PTS[Math.min(uid, MERGE_PTS.length-1)] * (isGolden ? 3 : 1));
    const earned = Math.round(basePoints * Math.min(5.0, 1.0+(chainCount-1)*0.5) * Math.min(3.0, 1.0+(level-1)*0.25));
    score += earned;

    spawnParticles(mx, my, newId, isGolden); spawnFloatText(mx, my, earned, chainCount, isGolden);

    Composite.remove(engine.world, a, true); Composite.remove(engine.world, b, true);

    const nb = UNITS[newId].mkBody(mx, my); nb.isGolden = newGolden;
    Body.setVelocity(nb, {x: (Math.random()-.5)*3.5, y: -(2.8 + newId*0.4)});
    Body.setAngularVelocity(nb, (Math.random()-.5)*0.28);
    Composite.add(engine.world, nb);

    const shockR = UNITS[newId].r * 2.0, shockF = 3.0 + newId*0.35;
    for(const ob of Composite.allBodies(engine.world)){
      if(ob.label !== 'unit' || ob === nb) continue;
      const dx = ob.position.x - mx, dy = ob.position.y - my, dist = Math.hypot(dx,dy);
      if(dist < shockR && dist > 0){
        const f = (1 - dist/shockR) * shockF;
        Body.setVelocity(ob, {x: ob.velocity.x + (dx/dist)*f, y: ob.velocity.y + (dy/dist)*f - .4});
      }
    }
    mergeCount += isGolden ? 3 : 1; checkLevelUp(); updateUI();
  }
}

function checkLevelUp(){
  const req = LEVEL_REQS[Math.min(level-1, LEVEL_REQS.length-1)];
  if(mergeCount >= req && !camAnimating) startTransition();
}

function startTransition(){
  canSpawn = false; camAnimating = true;
  document.getElementById('lvl-banner-title').textContent = `Level ${level} Complete! 🎉`;
  showOvl('lvl-banner'); setTimeout(() => hideOvl('lvl-banner'), 2200);

  const newFloorY = worldBottom() + fieldH;
  const newWall = Bodies.rectangle(fieldW/2, newFloorY+26, fieldW+120, 52, WALL_O);
  Composite.add(engine.world, newWall); Composite.remove(engine.world, bottomWall); bottomWall = newWall;

  engine.gravity.y = 3.4;
  Composite.allBodies(engine.world).forEach(ob => {
    if(ob.label !== 'unit') return;
    Body.setVelocity(ob, {x: ob.velocity.x*.3 + (Math.random()-.5)*6, y: Math.max(ob.velocity.y, 2.5) + Math.random()*2});
    Body.setAngularVelocity(ob, (Math.random()-.5)*0.22);
  });
  camAnimFrom = cameraY; camAnimTo = cameraY + fieldH; camAnimStart = performance.now();
}

function updateCamera(){
  if(!camAnimating) return;
  const units = Composite.allBodies(engine.world).filter(b => b.label === 'unit');
  if(units.length > 0){
    const lowestEdge = Math.max(...units.map(b => b.position.y + (UNITS[b.unitId ?? 0]?.r ?? 20)));
    cameraY = Math.min(camAnimTo, Math.max(camAnimFrom, lowestEdge + 50 - (SPAWN_H + fieldH)));
  } else cameraY = camAnimTo;

  if(cameraY >= camAnimTo - 2 && (performance.now() - camAnimStart > 5000 || units.every(b => Math.hypot(b.velocity.x, b.velocity.y) < 1.2))){
    cameraY = camAnimTo; camAnimating = false; canSpawn = true; engine.gravity.y = 2.1;
    level++; mergeCount = 0; goTimer = 0; updateUI(); drawUnitBar();
  }
}

function checkGameOver(){
  if(gameOver || camAnimating) return;
  let danger = false;
  for(const b of Composite.allBodies(engine.world)){
    if(b.label !== 'unit' || b.unitId === undefined) continue;
    if(b.bounds.min.y < worldDanger() && Math.hypot(b.velocity.x, b.velocity.y) < 2.0){ danger = true; b.isDanger = true; } 
    else { b.isDanger = false; }
  }
  if(danger){ goTimer++; if(goTimer > 180) triggerGameOver(); } 
  else { goTimer = Math.max(0, goTimer - 2); }
}

function triggerGameOver(){
  if(gameOver) return;
  gameOver = true; canSpawn = false;
  document.getElementById('go-level').textContent = level;
  document.getElementById('go-score-val').textContent = score.toLocaleString();
  showOvl('go-overlay');
}

function updateUI(){
  const req = LEVEL_REQS[Math.min(level-1, LEVEL_REQS.length-1)];
  const pct = Math.min(100, mergeCount / req * 100) + '%';
  document.getElementById('ui-score').textContent = document.getElementById('m-score').textContent = score.toLocaleString();
  document.getElementById('ui-level').textContent = document.getElementById('m-level').textContent = level;
  document.getElementById('ui-merges').textContent = document.getElementById('m-merges').textContent = mergeCount + '/' + req;
  document.getElementById('ui-prog').style.width = document.getElementById('m-prog').style.width = pct;
  document.getElementById('next-name').textContent = document.getElementById('m-next-name').textContent = UNITS[nxtId].name;
  
  const chainVisible = chainCount > 1 && performance.now() - lastMergeTime < CHAIN_WINDOW_MS * 1.5;
  const chainTxt = chainVisible ? `🔥 ×${chainCount} chain!` : '';
  const chainCol = chainCount > 3 ? '#e02000' : '#e07020';
  const cEl = document.getElementById('ui-chain'), mCEl = document.getElementById('m-chain');
  if(cEl){ cEl.textContent = chainTxt; cEl.style.color = chainCol; }
  if(mCEl){ mCEl.textContent = chainTxt; mCEl.style.color = chainCol; }

  nCtx.clearRect(0,0,100,100); nCtx.save(); nCtx.translate(50,50); drawStandalone(nCtx, nxtId, 38, false); nCtx.restore();
  mNCtx.clearRect(0,0,44,44); mNCtx.save(); mNCtx.translate(22,22); drawStandalone(mNCtx, nxtId, 18, false); mNCtx.restore();
}

function drawStandalone(context, uid, renderR, golden) {
  const u = UNITS[uid]; const scale = renderR / u.r;
  context.save(); context.scale(scale, scale);
  context.beginPath();
  if (u.isCircle) {
    if (u.name === 'Donut') { context.arc(0, 0, u.r, 0, TAU, false); context.arc(0, 0, u.r*0.35, TAU, 0, true); } 
    else context.arc(0, 0, u.r, 0, TAU);
  } else {
    context.moveTo(u.localVerts[0].x, u.localVerts[0].y);
    for(let i=1; i<u.localVerts.length; i++) context.lineTo(u.localVerts[i].x, u.localVerts[i].y);
    context.closePath();
  }
  context.clip(); u.drawFn(context, u.r, golden); drawGloss(context, u.r);
  context.beginPath();
  if (u.isCircle) {
    if (u.name === 'Donut') { context.arc(0, 0, u.r, 0, TAU, false); context.arc(0, 0, u.r*0.35, TAU, 0, true); } 
    else context.arc(0, 0, u.r, 0, TAU);
  } else {
    context.moveTo(u.localVerts[0].x, u.localVerts[0].y);
    for(let i=1; i<u.localVerts.length; i++) context.lineTo(u.localVerts[i].x, u.localVerts[i].y);
    context.closePath();
  }
  context.lineWidth = golden ? 6 : 4; context.strokeStyle = golden ? '#ffd700' : (u.borderCol || '#4a2c11');
  context.lineJoin = 'round'; context.stroke(); context.restore();
}

function drawWorldUnit(context, body, uid, golden) {
  const u = UNITS[uid];
  context.save(); context.beginPath();
  if (u.isCircle) {
    if (u.name === 'Donut') { context.arc(body.position.x, body.position.y, u.r, 0, TAU, false); context.arc(body.position.x, body.position.y, u.r*0.35, TAU, 0, true); } 
    else context.arc(body.position.x, body.position.y, u.r, 0, TAU);
  } else {
    context.moveTo(body.vertices[0].x, body.vertices[0].y);
    for(let i=1; i<body.vertices.length; i++) context.lineTo(body.vertices[i].x, body.vertices[i].y);
    context.closePath();
  }
  context.clip(); context.translate(body.position.x, body.position.y); context.rotate(body.angle);
  u.drawFn(context, u.r, golden); drawGloss(context, u.r);
  context.restore(); context.save(); context.beginPath();
  if (u.isCircle) {
    if (u.name === 'Donut') { context.arc(body.position.x, body.position.y, u.r, 0, TAU, false); context.arc(body.position.x, body.position.y, u.r*0.35, TAU, 0, true); } 
    else context.arc(body.position.x, body.position.y, u.r, 0, TAU);
  } else {
    context.moveTo(body.vertices[0].x, body.vertices[0].y);
    for(let i=1; i<body.vertices.length; i++) context.lineTo(body.vertices[i].x, body.vertices[i].y);
    context.closePath();
  }
  context.lineWidth = golden ? 6 : 4; context.strokeStyle = golden ? '#ffd700' : (u.borderCol || '#4a2c11');
  context.lineJoin = 'round'; context.stroke();
  if (body.isDanger) { context.fillStyle = `rgba(255,255,255,${0.3 * ((Math.sin(Date.now() / 150) + 1) / 2)})`; context.fill(); }
  context.restore();
}

function drawUnitBar(){
  if(!barCtx) return;
  barCtx.clearRect(0,0,fieldW,BAR_H); barCtx.fillStyle = '#fff8e6'; barCtx.fillRect(0,0,fieldW,BAR_H);
  const n = UNITS.length, slotW = fieldW/n, maxR = UNITS[n-1].r, maxIconR = (BAR_H-16)*0.5;
  for(let i=0; i<n; i++){
    const u = UNITS[i], cx = slotW*(i+.5), iR = Math.max(5, (u.r/maxR)*maxIconR), cy = BAR_H-15-iR;
    const unlocked = i <= SPAWN_MAX + level; barCtx.globalAlpha = unlocked ? 1 : 0.2;
    barCtx.save(); barCtx.translate(cx, cy); drawStandalone(barCtx, i, iR, false); barCtx.restore();
    barCtx.globalAlpha = 1; barCtx.fillStyle = unlocked ? '#7a3e0a' : '#c0a070';
    barCtx.font = `700 ${Math.max(6, Math.floor(slotW*.22))}px Nunito,sans-serif`;
    barCtx.textAlign = 'center'; barCtx.fillText(u.name.split(' ')[0].substring(0,6), cx, BAR_H-2);
    if(i<n-1){ barCtx.fillStyle = 'rgba(160,100,40,.3)'; barCtx.font='7px sans-serif'; barCtx.fillText('→', slotW*(i+1), BAR_H-15); }
  }
}

const UCOLS=['#c97838','#8fa8c8','#ff7eb6','#fffae6','#eabf7b','#e6ab4c','#c2854b','#d49648','#cc2a18','#ffffff'];
function spawnParticles(x,y,uid,golden){
  const col = golden ? '#ffd700' : UCOLS[Math.min(uid, UCOLS.length-1)], n = golden?18:12;
  for(let i=0; i<n; i++){
    const ang = (i/n)*TAU + Math.random()*.3, spd = 3 + Math.random()*(golden?7:5);
    particles.push({x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, life: 1, decay: .032+Math.random()*.03, r: 3+Math.random()*(golden?7:5), col});
  }
}
function spawnFloatText(x,y,pts,chain,golden){
  floatTexts.push({x, y: y-10, text: `+${pts}${chain>1?` ×${chain}`:''}`, life: 1, vy: -1.8, color: golden?'#e8c000':chain>2?'#ff5500':chain>1?'#e07020':'#7a3e0a', size: Math.min(18, 10+chain*1.5+(golden?3:0))});
}
function updateParticles(){
  for(let i=particles.length-1; i>=0; i--){ const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=.18; p.life-=p.decay; if(p.life<=0) particles.splice(i,1); }
  for(let i=floatTexts.length-1; i>=0; i--){ const t=floatTexts[i]; t.y+=t.vy; t.vy*=0.94; t.life-=0.022; if(t.life<=0) floatTexts.splice(i,1); }
}

function renderLoop(){
  if(!gameRunning){ requestAnimationFrame(renderLoop); return; }
  requestAnimationFrame(renderLoop); updateCamera(); updateParticles(); checkGameOver();

  ctx.clearRect(0,0,canvas.width,canvas.height); ctx.save(); ctx.translate(0, -cameraY);
  ctx.fillStyle = BG; ctx.fillRect(0, cameraY, fieldW, SPAWN_H + fieldH*3);
  const gs = 26, sy0 = Math.floor(cameraY/gs)*gs; ctx.fillStyle = 'rgba(200,155,80,.13)';
  for(let gx=14; gx<fieldW; gx+=gs) for(let gy=sy0; gy<cameraY+SPAWN_H+fieldH*3; gy+=gs){ ctx.beginPath(); ctx.arc(gx,gy,1.3,0,TAU); ctx.fill(); }

  const dY = worldDanger();
  ctx.setLineDash([6,5]); ctx.strokeStyle = 'rgba(200,65,35,.4)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, dY); ctx.lineTo(fieldW, dY); ctx.stroke(); ctx.setLineDash([]);
  
  if (goTimer > 0) {
    ctx.fillStyle = `rgba(255, 60, 40, ${0.1 + 0.15 * Math.sin(Date.now() / 100)})`; ctx.fillRect(0, cameraY, fieldW, SPAWN_H);
    ctx.fillStyle = 'rgba(195,55,25,.8)'; ctx.font = '700 12px Nunito,sans-serif'; ctx.textAlign = 'center'; ctx.fillText('⚠ CAREFUL!', fieldW/2, dY - 8);
  }

  const wh = camAnimating ? fieldH*2.2 : fieldH;
  ctx.fillStyle = '#b8885a'; ctx.fillRect(0,dY,4,wh); ctx.fillRect(fieldW-4,dY,4,wh); ctx.fillRect(0,worldBottom()-4,fieldW,4);

  if(camAnimating){
    const nbt = camAnimTo + SPAWN_H + fieldH;
    ctx.fillStyle = 'rgba(180,130,60,.55)'; ctx.fillRect(0,nbt-4,fieldW,4);
    ctx.fillStyle = 'rgba(200,140,0,.6)'; ctx.font = '800 11px Nunito,sans-serif'; ctx.textAlign = 'center'; ctx.fillText(`✦ LEVEL ${level+1} ✦`, fieldW/2, nbt-10);
  }

  ctx.save(); ctx.beginPath(); ctx.rect(0, cameraY, fieldW, SPAWN_H + fieldH*3); ctx.clip();
  for(const body of Composite.allBodies(engine.world)){ if(body.label === 'unit' && body.unitId !== undefined){ drawWorldUnit(ctx, body, body.unitId, !!body.isGolden); } }

  for(const p of particles){ ctx.globalAlpha = p.life; ctx.fillStyle = p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,TAU); ctx.fill(); }
  ctx.globalAlpha = 1;
  for(const t of floatTexts){
    ctx.globalAlpha = Math.min(1, t.life*2); ctx.fillStyle = t.color; ctx.strokeStyle = 'rgba(255,255,255,.7)'; ctx.lineWidth = 3;
    ctx.font = `800 ${t.size}px Nunito,sans-serif`; ctx.textAlign = 'center'; ctx.strokeText(t.text, t.x, t.y); ctx.fillText(t.text, t.x, t.y);
  }
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#b8885a'; ctx.fillRect(0,dY,6,fieldH*3); ctx.fillRect(fieldW-6,dY,6,fieldH*3);
  ctx.restore(); ctx.restore();

  if(canSpawn && !gameOver && !camAnimating){
    const u = UNITS[curId]; 
    const py = SPAWN_H - u.r - 12;
    
    // Fall-Linie zeichnen
    ctx.strokeStyle = 'rgba(140,85,25,.22)'; 
    ctx.setLineDash([4,5]); 
    ctx.lineWidth = 1.5;
    ctx.beginPath(); 
    ctx.moveTo(spawnX, py + u.r); 
    ctx.lineTo(spawnX, SPAWN_H + fieldH); 
    ctx.stroke(); 
    ctx.setLineDash([]);
    
    // Preview-Objekt (leicht transparent) oben am Cursor zeichnen
    ctx.save(); 
    ctx.globalAlpha = 0.78; 
    ctx.translate(spawnX, py); 
    drawStandalone(ctx, curId, u.r, false); 
    ctx.restore(); 
    ctx.globalAlpha = 1;
  }

  // Transition Vignette (Dunkler Rand während man ins nächste Level fällt)
  if(camAnimating){
    const prog = Math.max(0, Math.min(1, (cameraY - camAnimFrom) / (camAnimTo - camAnimFrom)));
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, `rgba(0,0,0,${0.18 * prog})`); 
    grad.addColorStop(0.45, 'rgba(0,0,0,0)');
    grad.addColorStop(0.55, 'rgba(0,0,0,0)'); 
    grad.addColorStop(1, `rgba(0,0,0,${0.18 * prog})`);
    ctx.fillStyle = grad; 
    ctx.fillRect(0, 0, fieldW, canvas.height);
  }
}
</script>
